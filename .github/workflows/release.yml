# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# docs: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

name: 🚀 Release

on:
  workflow_dispatch: {}
  release: {types: [published]}

jobs:
  build-docker-image:
    name: Build the docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for keyless cosign signing via GitHub OIDC
    outputs:
      docker-tags: ${{ steps.docker-tags.outputs.list }}
    env:
      HUB_IMAGE: tarampampam/3proxy
      GHCR_IMAGE: ghcr.io/tarampampam/3proxy
      QUAY_IMAGE: quay.io/tarampampam/3proxy
    steps:
      - uses: actions/checkout@v6
      - uses: gacts/github-slug@v1
        id: slug
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with: {username: tarampampam, password: '${{ secrets.DOCKER_PASSWORD }}'}
      - uses: docker/login-action@v4
        with: {registry: ghcr.io, username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}'}
      - uses: docker/login-action@v4
        with: {registry: quay.io, username: '${{ secrets.QUAY_LOGIN }}', password: '${{ secrets.QUAY_PASSWORD }}'}
      - id: docker-tags
        env:
          EXACT: ${{ steps.slug.outputs.version-semantic }}
          MINOR: ${{ steps.slug.outputs.version-major }}.${{ steps.slug.outputs.version-minor }}
          MAJOR: ${{ steps.slug.outputs.version-major }}
        # TODO: add following tags after merging the PR
        # echo "$GHCR_IMAGE:latest" >> "$GITHUB_OUTPUT"
        # echo "$QUAY_IMAGE:latest" >> "$GITHUB_OUTPUT"
        # echo "$HUB_IMAGE:latest" >> "$GITHUB_OUTPUT"
        run: |
          echo 'list<<EOF' >> "$GITHUB_OUTPUT"
          echo "$GHCR_IMAGE:$EXACT" >> "$GITHUB_OUTPUT"
          echo "$GHCR_IMAGE:$MINOR" >> "$GITHUB_OUTPUT"
          echo "$GHCR_IMAGE:$MAJOR" >> "$GITHUB_OUTPUT"
          echo "$QUAY_IMAGE:$EXACT" >> "$GITHUB_OUTPUT"
          echo "$QUAY_IMAGE:$MINOR" >> "$GITHUB_OUTPUT"
          echo "$QUAY_IMAGE:$MAJOR" >> "$GITHUB_OUTPUT"
          echo "$HUB_IMAGE:$EXACT" >> "$GITHUB_OUTPUT"
          echo "$HUB_IMAGE:$MINOR" >> "$GITHUB_OUTPUT"
          echo "$HUB_IMAGE:$MAJOR" >> "$GITHUB_OUTPUT"
          echo 'EOF' >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        id: docker-push
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/ppc64le,linux/s390x
          build-args: "APP_VERSION=${{ steps.slug.outputs.version-semantic }}"
          tags: ${{ steps.docker-tags.outputs.list }}
      - uses: sigstore/cosign-installer@v4.1.1
      - run: |
          cosign sign --yes \
            "${{ env.HUB_IMAGE }}@${{ steps.docker-push.outputs.digest }}" \
            "${{ env.GHCR_IMAGE }}@${{ steps.docker-push.outputs.digest }}" \
            "${{ env.QUAY_IMAGE }}@${{ steps.docker-push.outputs.digest }}"

  binary-files:
    name: Publish binary files (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [build-docker-image]
    strategy:
      matrix:
        platform: # the list should be the same as the platforms listed above
          - linux/amd64
          - linux/arm/v7
          - linux/arm64
          - linux/ppc64le
          - linux/s390x
    steps:
      - uses: actions/checkout@v6
      - uses: gacts/github-slug@v1
        id: slug
      - uses: docker/login-action@v4
        with: {registry: ghcr.io, username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}'}
      - run: |
          docker pull --platform "${{ matrix.platform }}" ghcr.io/tarampampam/3proxy:${{ steps.slug.outputs.version-semantic }}
          docker create --name app --platform "${{ matrix.platform }}" ghcr.io/tarampampam/3proxy:${{ steps.slug.outputs.version-semantic }} /noop
          mkdir ./dist
          docker cp app:/bin/3proxy ./dist/3proxy
          cd ./dist
          tar -czf ../release.tar.gz *
          zip -r ../release.zip .
      - uses: gacts/github-slug@v1
        id: filename
        with: {to-slug: '${{ matrix.platform }}'}
      - uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./release.tar.gz
          asset_name: ${{ steps.filename.outputs.slug }}.tar.gz
          tag: ${{ github.ref }}
      - uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./release.zip
          asset_name: ${{ steps.filename.outputs.slug }}.zip
          tag: ${{ github.ref }}

  build-helm-chart:
    name: Build the Helm chart
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: ./deploy/helm}}
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - uses: gacts/github-slug@v1
        id: slug
      - uses: mikefarah/yq@v4
        with:
          cmd: yq -i '(.version, .appVersion) = "${{ steps.slug.outputs.version-semantic }}"' ./deploy/helm/Chart.yaml
      - uses: losisin/helm-docs-github-action@v1
        with:
          chart-search-root: ./deploy/helm
          template-files: README.tpl.md
          output-file: README.md
      - run: |
          helm package .
          mv the3proxy-*.tgz helm-chart.tgz
      - uses: actions/upload-artifact@v7
        with:
          name: helm-chart
          path: deploy/helm/helm-chart.tgz
          if-no-files-found: error
          retention-days: 1
      - uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: deploy/helm/helm-chart.tgz
          asset_name: helm-chart.tgz
          tag: ${{ github.ref }}

  generate-checksums:
    name: Generate checksums.txt
    runs-on: ubuntu-latest
    needs: [binary-files, build-helm-chart]
    steps:
      - uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: '*'
          token: ${{ secrets.GITHUB_TOKEN }}
          out-file-path: .artifact
      - working-directory: .artifact
        run: sha256sum $(ls | grep -v checksums.txt) > checksums.txt
      - uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: .artifact/checksums.txt
          asset_name: checksums.txt
          tag: ${{ github.ref }}

  publish-helm-chart:
    name: Publish the Helm chart to OCI registry
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write # required for keyless cosign signing via GitHub OIDC
    defaults: {run: {working-directory: ./deploy/helm}}
    needs: [build-helm-chart, build-docker-image]
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - uses: gacts/github-slug@v1
        id: slug
      - uses: oras-project/setup-oras@v2
      - uses: actions/download-artifact@v8
        with:
          name: helm-chart
          path: deploy/helm
      - id: push-chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin
          helm push \
            "helm-chart.tgz" \
            oci://ghcr.io/tarampampam/3proxy/charts
          DIGEST=$(oras resolve \
            "ghcr.io/tarampampam/3proxy/charts/the3proxy:${{ steps.slug.outputs.version-semantic }}")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
      - uses: sigstore/cosign-installer@v4.1.1
      - run: |
          cosign sign --yes \
            "ghcr.io/tarampampam/3proxy/charts/the3proxy@${{ steps.push-chart.outputs.digest }}"
      - run: |
          oras push \
            --config /dev/null:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml \
            ghcr.io/tarampampam/3proxy/charts/the3proxy:artifacthub.io \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

  update-release-note:
    name: Update release note
    runs-on: ubuntu-latest
    needs: [build-docker-image, publish-helm-chart]
    steps:
      - uses: actions/checkout@v6
      - uses: gacts/github-slug@v1
        id: slug
      - uses: gacts/add-to-release-notes@v1
        with:
          skip-if-contains: '## 🐋 Docker images'
          append: |
            ## 🐋 Docker images

            ```cpp
            ${{ needs.build-docker-image.outputs.docker-tags }}
            ```

            ## 📦 Helm chart

            ```bash
            helm install the3proxy oci://ghcr.io/tarampampam/3proxy/charts/the3proxy \
              --version ${{ steps.slug.outputs.version-semantic }}
            ```
