# yaml-language-server: $schema=https://json.schemastore.org/github-issue-forms.json
# docs: https://git.io/JR5E4

name: 🐞 Bug report
description: File a bug/issue
labels: ['type:bug']
assignees: [tarampampam]
body:
  - type: checkboxes
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched the existing issues
          required: true
        - label: |
            This issue is about **this Docker image** itself _(entrypoint logic, configuration templating,
            image build, or environment variable handling)_, **not** 3proxy behavior, networking, Docker, or any
            other external tool
          required: true

  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. ...
        2. ...
        3. See error

  - type: input
    id: version
    attributes:
      label: Image version
      description: Please specify the image tag you are using
      placeholder: 2.0.0
    validations:
      required: true

  - type: textarea
    id: configs
    attributes:
      label: Configuration
      description: |
        Relevant environment variables, docker-compose, or docker run command. This will be automatically
        formatted into code (yaml), so no need for backticks.
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Please copy and paste any relevant log output. This will be automatically formatted into code
        (shell), so no need for backticks.
      render: shell

  - type: textarea
    attributes:
      label: Anything else?
      description: Links? References? Anything that will give us more context about the issue you are encountering!
