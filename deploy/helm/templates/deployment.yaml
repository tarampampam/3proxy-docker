{{- if .Values.deployment.enabled }}
{{- $kind := .Values.deployment.kind | default "Deployment" }}
apiVersion: apps/v1
kind: {{ $kind }}

metadata:
  name: {{ include "3proxy.fullname" . }}
  namespace: {{ template "3proxy.namespace" . }}
  labels:
    {{- include "3proxy.commonLabels" . | nindent 4 }}

spec:
  {{- if ne $kind "DaemonSet" }}
  replicas: {{ .Values.deployment.replicas }}
  {{- with .Values.deployment.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- else }}
  {{- with .Values.deployment.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "3proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.deployment.podAnnotations }}
      annotations:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      labels:
        {{- include "3proxy.commonLabels" . | nindent 8 }}
        {{- with .Values.deployment.labels }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      {{- with .Values.deployment.imagePullSecrets }}
      imagePullSecrets:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "3proxy.fullname" . }}

          {{- with .Values.deployment.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.image }}
          image: "{{ .repository }}:{{ .tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ .pullPolicy | default "IfNotPresent" }}
          {{- end }}
          ports:
            - name: proxy
              containerPort: {{ .Values.config.ports.proxy }}
              protocol: TCP
            - name: socks
              containerPort: {{ .Values.config.ports.socks }}
              protocol: TCP
          env:
            - {name: PROXY_PORT, value: "{{ .Values.config.ports.proxy }}"}
            - {name: SOCKS_PORT, value: "{{ .Values.config.ports.socks }}"}
          {{- with .Values.config }}
            {{- if eq .log.enabled false }}
            - {name: LOG_OUTPUT, value: "/dev/null"}
            {{- else if .log.output }}
            - {name: LOG_OUTPUT, value: "{{ .log.output }}"}
            {{- end }}

            {{- if .auth.login }}
            - {name: PROXY_LOGIN, value: "{{ .auth.login }}"}
            {{- end }}
            {{- if .auth.password }}
            - {name: PROXY_PASSWORD, value: "{{ .auth.password }}"}
            {{- end }}
            {{- if .auth.extraAccounts }}
            {{- $parts := list }}
            {{- range .auth.extraAccounts }}
            {{- $parts = append $parts (printf "%s:%s" .login .password) }}
            {{- end }}
            - {name: EXTRA_ACCOUNTS, value: {{ join ";" $parts | quote }}}
            {{- end }}

            {{- if .dns.primaryResolver }}
            - {name: PRIMARY_RESOLVER, value: "{{ .dns.primaryResolver }}"}
            {{- end }}
            {{- if .dns.secondaryResolver }}
            - {name: SECONDARY_RESOLVER, value: "{{ .dns.secondaryResolver }}"}
            {{- end }}
            {{- if ne .dns.cacheSize nil }}
            - {name: DNS_CACHE_SIZE, value: "{{ .dns.cacheSize }}"}
            {{- end }}

            {{- if ne .limits.maxConnections nil }}
            - {name: MAX_CONNECTIONS, value: "{{ .limits.maxConnections }}"}
            {{- end }}

            {{- if .extraConfig }}
            - name: EXTRA_CONFIG
              value: >-
                {{ .extraConfig }}
            {{- end }}
          {{- end }}
          {{- with .Values.deployment.env }}
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}

          {{- with .Values.deployment.args }}
          args:
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}

          {{- with .Values.deployment.probe }}
          livenessProbe:
            tcpSocket: {port: {{ .port | quote }}}
            periodSeconds: {{ .interval }}
            initialDelaySeconds: {{ .initialDelay }}
          readinessProbe:
            tcpSocket: {port: {{ .port | quote }}}
            periodSeconds: {{ .interval }}
            initialDelaySeconds: {{ .initialDelay }}
          {{- end }}

          {{- with .Values.deployment.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            - {name: 3proxy-config, mountPath: /etc/3proxy}
            - {name: tmp, mountPath: /tmp}
          {{- with .Values.deployment.volumeMounts }}
            {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}

      volumes:
        - name: 3proxy-config
          emptyDir: {medium: Memory, sizeLimit: 256Ki}
        - name: tmp
          emptyDir: {sizeLimit: 500Mi}
      {{- with .Values.deployment.volumes }}
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}

      {{- with .Values.deployment.nodeSelector }}
      nodeSelector:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}

      {{- with .Values.deployment.affinity }}
      affinity:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}

      {{- with .Values.deployment.tolerations }}
      tolerations:
        {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
{{- end }}
